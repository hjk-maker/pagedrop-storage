<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageDrop — Project Router</title>
  <script src="pagedrop-live.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0908;
      color: #fafaf9;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 720px; margin: 0 auto; }
    h1 {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p.lead { color: #a8a29e; text-align: center; margin-bottom: 2rem; font-size: 1.05rem; }
    .search-box { display: flex; gap: 10px; margin-bottom: 1rem; }
    input {
      flex: 1;
      padding: 15px 20px;
      border: 2px solid #292524;
      border-radius: 12px;
      background: #141210;
      color: #fafaf9;
      font-size: 1rem;
      font-family: 'Courier New', monospace;
      transition: border-color 0.3s;
    }
    input:focus { outline: none; border-color: #f59e0b; }
    input::placeholder { color: #57534e; }
    button {
      padding: 15px 30px;
      background: #f59e0b;
      color: #0a0908;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
      white-space: nowrap;
    }
    button:hover { background: #fbbf24; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { color: #fca5a5; margin-top: 1rem; display: none; text-align: center; }
    .id-lookup {
      margin-top: 2.5rem;
      padding: 1.25rem 1.5rem;
      background: #141210;
      border: 1px solid #292524;
      border-radius: 12px;
    }
    .id-lookup h3 { color: #f59e0b; margin-bottom: 0.5rem; font-size: 0.95rem; }
    .id-lookup p { color: #a8a29e; font-size: 0.85rem; }
    code {
      background: #1c1917;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      color: #fbbf24;
    }
    .section-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #f59e0b;
      margin: 2rem 0 0.75rem;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .card {
      display: block;
      padding: 16px;
      border-radius: 14px;
      background: #141210;
      border: 1px solid #292524;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s;
    }
    .card:hover { border-color: rgba(245, 158, 11, 0.4); transform: translateY(-2px); }
    .card .name { font-weight: 600; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card .meta { font-size: 0.75rem; color: #78716c; margin-bottom: 8px; }
    .card .tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .card .tag {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(245, 158, 11, 0.08);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, 0.15);
    }
    .empty { color: #78716c; text-align: center; padding: 2rem 0; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>PageDrop Router</h1>
    <p class="lead">Search projects hosted in this repo, or jump straight to an ID.</p>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search by name or tag…" autocomplete="off">
    </div>

    <div class="section-label" id="resultsLabel">Recent projects</div>
    <div class="grid" id="resultsGrid"></div>
    <div class="empty" id="emptyState" style="display:none;">No projects found.</div>

    <div class="id-lookup">
      <h3>Have a 12-character project ID instead?</h3>
      <p style="margin-bottom: 10px;">Type it in above, or open it directly: <code>?id=4YdSiwemVnF1</code></p>
      <div class="search-box" style="margin-bottom: 0;">
        <input type="text" id="projectId" placeholder="e.g. 4YdSiwemVnF1" maxlength="12" autocomplete="off">
        <button id="loadBtn" onclick="loadProjectById()">Open</button>
      </div>
      <div class="error" id="idError">Project not found, or that folder has no index.html</div>
    </div>
  </div>

  <script>
    // Point this at your deployed Worker (see worker/wrangler.toml).
    const API_BASE = 'https://pagedrop-worker.hjk-maker.workers.dev';

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const s = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
      if (s < 60) return 'just now';
      if (s < 3600) return Math.floor(s / 60) + 'm ago';
      if (s < 86400) return Math.floor(s / 3600) + 'h ago';
      return Math.floor(s / 86400) + 'd ago';
    }

    function formatBytes(bytes) {
      if (!bytes) return '0 B';
      const k = 1024, sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    function renderResults(results) {
      const grid = document.getElementById('resultsGrid');
      const empty = document.getElementById('emptyState');
      grid.innerHTML = '';
      empty.style.display = results.length ? 'none' : 'block';
      for (const r of results) {
        const a = document.createElement('a');
        a.href = r.liveUrl;
        a.target = '_blank';
        a.className = 'card';
        const tags = (r.tags || []).slice(0, 3).map(t => `<span class="tag">${t}</span>`).join('');
        a.innerHTML = `
          <div class="name">${r.name || 'Untitled'}</div>
          <div class="meta">${r.file_count} files · ${formatBytes(r.total_size)} · ${timeAgo(r.created_at)}</div>
          <div class="tags">${tags}</div>
        `;
        grid.appendChild(a);
      }
    }

    // Real metadata, not a static file scan: this calls the same D1-backed
    // /api/search the main frontend uses, so it's fast even with thousands
    // of projects across multiple rotated storage repos.
    let searchTimer = null;
    document.getElementById('searchInput').addEventListener('input', (e) => {
      clearTimeout(searchTimer);
      const q = e.target.value.trim();
      document.getElementById('resultsLabel').textContent = q ? `Results for "${q}"` : 'Recent projects';
      searchTimer = setTimeout(async () => {
        try {
          if (!q) {
            const data = await (await fetch(`${API_BASE}/api/recent`)).json();
            renderResults(data.results || []);
            return;
          }
          const data = await (await fetch(`${API_BASE}/api/search?q=${encodeURIComponent(q)}`)).json();
          renderResults(data.results || []);
        } catch (err) {
          console.warn('Search failed:', err.message);
        }
      }, 250);
    });

    // Auto-refreshing "recent projects" using the shared library — this is
    // the default view before anyone types a search term.
    PageDropLive.watch(`${API_BASE}/api/recent`, {
      interval: 20000,
      onUpdate: (data) => {
        if (!document.getElementById('searchInput').value.trim()) {
          renderResults(data.results || []);
        }
      },
    });

    function setLoading(isLoading) {
      document.getElementById('loadBtn').disabled = isLoading;
      document.getElementById('loadBtn').textContent = isLoading ? 'Checking…' : 'Open';
    }

    function loadProjectById() {
      const input = document.getElementById('projectId');
      const errorMsg = document.getElementById('idError');
      const projectId = input.value.trim();

      if (!projectId || projectId.length !== 12 || !/^[A-Za-z0-9_-]+$/.test(projectId)) {
        errorMsg.textContent = 'Please enter a valid 12-character project ID';
        errorMsg.style.display = 'block';
        return;
      }

      errorMsg.style.display = 'none';
      setLoading(true);

      // The project might live in a different rotated repo than this one —
      // ask the Worker (which knows, via D1) rather than guessing a path.
      fetch(`${API_BASE}/api/project/${projectId}`)
        .then((res) => res.json())
        .then((data) => {
          setLoading(false);
          if (data.error || !data.liveUrl) {
            errorMsg.textContent = 'Project not found';
            errorMsg.style.display = 'block';
            return;
          }
          window.location.href = data.liveUrl + 'index.html';
        })
        .catch((err) => {
          setLoading(false);
          errorMsg.textContent = 'Error loading project: ' + err.message;
          errorMsg.style.display = 'block';
        });
    }

    document.getElementById('projectId').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loadProjectById();
    });

    // Supports direct links like ?id=4YdSiwemVnF1 to skip typing.
    const urlParams = new URLSearchParams(window.location.search);
    const projectIdFromUrl = urlParams.get('id');
    if (projectIdFromUrl) {
      document.getElementById('projectId').value = projectIdFromUrl;
      loadProjectById();
    }
  </script>
</body>
</html>
