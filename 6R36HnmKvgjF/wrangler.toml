name = "pagedrop-worker"
main = "index.js"
compatibility_date = "2026-07-01"

[[d1_databases]]
binding = "DB"
database_name = "pagedrop_db"
database_id = ""

[vars]
# 10 MB per-file cap
MAX_FILE_SIZE_BYTES = "10485760"
# Set to your actual frontend domain once deployed (used for CORS)
ALLOWED_ORIGIN = "https://pagedrop.pages.dev"

# Public info only — safe to keep here (not secret)
GITHUB_OWNER = "hjk-maker"
GITHUB_REPO = "pagedrop-storage"
GITHUB_BRANCH = "main"

# GITHUB_TOKEN is NOT set here. Set it as a secret instead, so it never
# touches source control or the browser:
#   npx wrangler secret put GITHUB_TOKEN