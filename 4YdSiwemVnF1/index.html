<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageDrop — Drop Your Pages, No Login Needed</title>
  <meta name="description" content="Free, instant static hosting. No signup, no login. Drop your HTML, CSS, JS and get a shareable link in seconds.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309',800:'#92400e',900:'#78350f' },
            s: { 0:'#09090b',1:'#131316',2:'#1c1c20',3:'#27272a',4:'#3f3f46',5:'#71717a' }
          },
          fontFamily: { display:['Space Grotesk','sans-serif'], body:['DM Sans','sans-serif'] }
        }
      }
    }
  </script>
  <style>
    :root {
      --bg:#09090b; --card:#131316; --card2:#1c1c20; --fg:#fafaf9;
      --muted:#71717a; --accent:#f59e0b; --accent-h:#d97706; --border:#27272a;
    }
    * { box-sizing:border-box; }
    body { background:var(--bg); color:var(--fg); font-family:'DM Sans',sans-serif; }
    h1,h2,h3,h4,h5,h6 { font-family:'Space Grotesk',sans-serif; }
    ::selection { background:#f59e0b33; color:#fbbf24; }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--muted); }

    /* Animated background blobs */
    .blob { position:absolute; border-radius:50%; filter:blur(100px); opacity:.12; will-change:transform; }
    .blob-1 { width:700px; height:700px; background:#f59e0b; top:-250px; right:-150px; animation:blobFloat1 22s ease-in-out infinite; }
    .blob-2 { width:550px; height:550px; background:#d97706; bottom:-200px; left:-120px; animation:blobFloat2 28s ease-in-out infinite; }
    .blob-3 { width:400px; height:400px; background:#b45309; top:40%; left:40%; animation:blobFloat3 18s ease-in-out infinite; }
    @keyframes blobFloat1 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-80px,60px) scale(1.1)} 66%{transform:translate(40px,-40px) scale(.95)} }
    @keyframes blobFloat2 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(60px,-80px) scale(.9)} 66%{transform:translate(-50px,30px) scale(1.08)} }
    @keyframes blobFloat3 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-100px,80px) scale(1.15)} }

    /* Subtle grid overlay */
    .grid-overlay {
      position:absolute; inset:0;
      background-image: linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
                         linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* View transitions */
    .view-enter { animation:viewIn .35s ease-out both; }
    @keyframes viewIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    /* Drop zone */
    .drop-zone { border:2px dashed var(--border); transition:all .25s ease; }
    .drop-zone.drag-over { border-color:var(--accent); background:rgba(245,158,11,.06); transform:scale(1.005); }
    .drop-zone:hover { border-color:var(--muted); }

    /* Tag chip */
    .tag-chip { display:inline-flex; align-items:center; gap:4px; padding:2px 10px; border-radius:9999px;
      background:rgba(245,158,11,.1); color:#fbbf24; font-size:.75rem; font-weight:500; }
    .tag-chip button { background:none; border:none; color:#fbbf24; cursor:pointer; padding:0; line-height:1; opacity:.6; }
    .tag-chip button:hover { opacity:1; }

    /* Toast */
    .toast { padding:12px 20px; border-radius:10px; font-size:.875rem; font-weight:500;
      backdrop-filter:blur(12px); border:1px solid var(--border); animation:toastIn .3s ease-out;
      display:flex; align-items:center; gap:10px; max-width:380px; }
    .toast.success { background:rgba(34,197,94,.12); border-color:rgba(34,197,94,.3); color:#86efac; }
    .toast.error { background:rgba(239,68,68,.12); border-color:rgba(239,68,68,.3); color:#fca5a5; }
    .toast.info { background:rgba(245,158,11,.12); border-color:rgba(245,158,11,.3); color:#fde68a; }
    .toast-exit { animation:toastOut .25s ease-in forwards; }
    @keyframes toastIn { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
    @keyframes toastOut { to{opacity:0;transform:translateX(40px)} }

    /* Skeleton loader */
    .skeleton { background:linear-gradient(90deg,var(--card2) 25%,var(--card) 50%,var(--card2) 75%);
      background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:8px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* Stat counter animation */
    .stat-num { font-variant-numeric:tabular-nums; }

    /* Focus visible */
    *:focus-visible { outline:2px solid var(--accent); outline-offset:2px; border-radius:4px; }

    /* Code block */
    .code-block { background:#0d0d0f; border:1px solid var(--border); border-radius:10px; overflow:auto;
      font-family:'Courier New',monospace; font-size:.8125rem; line-height:1.7; padding:1.25rem; tab-size:2; }

    /* Iframe viewer */
    .viewer-frame { border:none; width:100%; height:70vh; background:#fff; border-radius:0 0 10px 10px; }

    @media (prefers-reduced-motion:reduce) {
      *,*::before,*::after { animation-duration:.01ms!important; transition-duration:.01ms!important; }
      .blob { animation:none!important; }
    }
  </style>
</head>
<body class="min-h-screen overflow-x-hidden">

  <!-- Background effects -->
  <div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <!-- Navigation -->
  <nav id="nav" class="fixed top-0 left-0 right-0 z-40 transition-all duration-300" style="background:rgba(9,9,11,.7);backdrop-filter:blur(16px);border-bottom:1px solid transparent;">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="#/" class="flex items-center gap-2.5 group" aria-label="PageDrop Home">
        <div class="w-8 h-8 rounded-lg bg-brand-500 flex items-center justify-center transition-transform group-hover:scale-110">
          <i data-lucide="arrow-down-to-line" class="w-4 h-4 text-s-0"></i>
        </div>
        <span class="font-display font-bold text-lg tracking-tight">PageDrop</span>
      </a>
      <div class="hidden sm:flex items-center gap-1">
        <a href="#/" class="nav-link px-4 py-2 rounded-lg text-sm font-medium text-s-5 hover:text-white hover:bg-s-2 transition-all" data-nav="home">Home</a>
        <a href="#/upload" class="nav-link px-4 py-2 rounded-lg text-sm font-medium text-s-5 hover:text-white hover:bg-s-2 transition-all" data-nav="upload">Upload</a>
        <a href="#/browse" class="nav-link px-4 py-2 rounded-lg text-sm font-medium text-s-5 hover:text-white hover:bg-s-2 transition-all" data-nav="browse">Browse</a>
      </div>
      <button id="mobile-menu-btn" class="sm:hidden p-2 rounded-lg hover:bg-s-2 transition-colors" aria-label="Menu">
        <i data-lucide="menu" class="w-5 h-5"></i>
      </button>
    </div>
    <!-- Mobile menu -->
    <div id="mobile-menu" class="sm:hidden hidden border-t border-s-3 px-6 pb-4 pt-2">
      <a href="#/" class="block py-2.5 text-sm text-s-5 hover:text-white transition-colors" data-nav="home">Home</a>
      <a href="#/upload" class="block py-2.5 text-sm text-s-5 hover:text-white transition-colors" data-nav="upload">Upload</a>
      <a href="#/browse" class="block py-2.5 text-sm text-s-5 hover:text-white transition-colors" data-nav="browse">Browse</a>
    </div>
  </nav>

  <!-- Main content -->
  <main id="app" class="pt-16 min-h-screen"></main>

  <!-- Toast container -->
  <div id="toasts" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3" aria-live="polite"></div>

  <!-- Footer -->
  <footer class="border-t border-s-3 mt-24">
    <div class="max-w-6xl mx-auto px-6 py-10 flex flex-col sm:flex-row items-center justify-between gap-4 text-sm text-s-5">
      <div class="flex items-center gap-2">
        <div class="w-5 h-5 rounded bg-brand-500 flex items-center justify-center">
          <i data-lucide="arrow-down-to-line" class="w-3 h-3 text-s-0"></i>
        </div>
        <span class="font-display font-semibold text-s-5">PageDrop</span>
        <span class="text-s-4 mx-1">·</span>
        <span>Free static hosting, no strings attached.</span>
      </div>
      <div class="flex items-center gap-4">
        <span>Built on Cloudflare</span>
        <span class="text-s-4">·</span>
        <span>Open &amp; Community-Driven</span>
      </div>
    </div>
  </footer>

<script>
// ====================================================================
// CONFIG
// ====================================================================
const API = ''; // Same origin — Pages proxies to Worker in production
const ALLOWED_TYPES = ['.html','.htm','.css','.js','.mjs','.json','.svg','.png','.jpg','.jpeg','.gif','.webp','.ico','.txt','.md','.xml','.woff','.woff2','.ttf','.eot','.map'];

// ====================================================================
// STATE
// ====================================================================
const state = {
  route: '',
  params: {},
  pendingFiles: [],
  tags: [],
  uploading: false,
  uploadResult: null,
  queueStatus: null,
  searchResults: [],
  searchLoading: false,
  searchQuery: '',
  browseCursor: null,
  viewerData: null,
  viewerLoading: false,
};

// ====================================================================
// UTILITIES
// ====================================================================
function $(sel, ctx=document) { return ctx.querySelector(sel); }
function $$(sel, ctx=document) { return [...ctx.querySelectorAll(sel)]; }

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function formatBytes(bytes) {
  if (bytes === 0) return '0 B';
  const k = 1024, sizes = ['B','KB','MB','GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

function timeAgo(dateStr) {
  const s = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  if (s < 2592000) return Math.floor(s/86400) + 'd ago';
  return new Date(dateStr).toLocaleDateString();
}

function getFileExt(name) {
  const idx = name.lastIndexOf('.');
  return idx >= 0 ? name.slice(idx).toLowerCase() : '';
}

function getFileType(ext) {
  if (['.html','.htm'].includes(ext)) return 'html';
  if (['.css'].includes(ext)) return 'css';
  if (['.js','.mjs'].includes(ext)) return 'js';
  if (['.json'].includes(ext)) return 'json';
  if (['.png','.jpg','.jpeg','.gif','.webp','.svg','.ico'].includes(ext)) return 'image';
  if (['.woff','.woff2','.ttf','.eot'].includes(ext)) return 'font';
  return 'other';
}

function getFileIcon(ext) {
  const t = getFileType(ext);
  const icons = { html:'file-code-2', css:'palette', js:'braces', json:'braces', image:'image', font:'type', other:'file' };
  return icons[t] || 'file';
}

function isAllowedFile(name) {
  return ALLOWED_TYPES.includes(getFileExt(name));
}

// ====================================================================
// TOAST SYSTEM
// ====================================================================
function toast(message, type='info') {
  const container = $('#toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icons = { success:'check-circle-2', error:'alert-circle', info:'info' };
  el.innerHTML = `<i data-lucide="${icons[type]||'info'}" class="w-4 h-4 flex-shrink-0"></i><span>${escapeHtml(message)}</span>`;
  container.appendChild(el);
  lucide.createIcons({ nodes:[el] });
  setTimeout(() => {
    el.classList.add('toast-exit');
    el.addEventListener('animationend', () => el.remove());
  }, 4000);
}

// ====================================================================
// API SERVICE
// ====================================================================
async function api(path, opts={}) {
  const url = API + path;
  const headers = { ...opts.headers };
  if (opts.body && !(opts.body instanceof FormData)) {
    headers['Content-Type'] = 'application/json';
  }
  try {
    const res = await fetch(url, { ...opts, headers });
    const data = await res.json().catch(() => null);
    if (!res.ok) throw new Error(data?.error || `HTTP ${res.status}`);
    return data;
  } catch (err) {
    if (err.name === 'TypeError') throw new Error('Cannot connect to server. Is the backend running?');
    throw err;
  }
}

// ====================================================================
// ROUTER
// ====================================================================
function router() {
  const hash = location.hash.slice(1) || '/';
  const [path, ...rest] = hash.split('/').filter(Boolean);
  state.route = path || 'home';
  state.params = {};

  if (state.route === 'f' && rest[0]) {
    state.params.id = rest[0];
    state.params.filePath = rest.slice(1).join('/');
  }
  if (state.route === 'queue' && rest[0]) {
    state.params.ticketId = rest[0];
  }

  render();
  updateNavActive();
  window.scrollTo({ top:0, behavior:'smooth' });

  // Close mobile menu
  $('#mobile-menu').classList.add('hidden');
}

function updateNavActive() {
  $$('.nav-link').forEach(a => {
    const nav = a.dataset.nav;
    const isActive = (nav === 'home' && state.route === 'home') || nav === state.route;
    a.classList.toggle('text-white', isActive);
    a.classList.toggle('bg-s-2', isActive);
    a.classList.toggle('text-s-5', !isActive);
  });
}

// ====================================================================
// RENDER ENGINE
// ====================================================================
function render() {
  const app = $('#app');
  switch(state.route) {
    case 'home': app.innerHTML = viewHome(); break;
    case 'upload': app.innerHTML = viewUpload(); initDropZone(); break;
    case 'browse': app.innerHTML = viewBrowse(); initBrowse(); break;
    case 'f': app.innerHTML = viewFile(); initViewer(); break;
    case 'queue': app.innerHTML = viewQueue(); initQueuePoll(); break;
    default: app.innerHTML = view404();
  }
  lucide.createIcons();
  // Trigger view-enter animation
  const view = app.firstElementChild;
  if (view) view.classList.add('view-enter');
}

// ====================================================================
// VIEW: HOME
// ====================================================================
function viewHome() {
  return `
  <div class="view-enter">
    <!-- Hero -->
    <section class="relative px-6 pt-20 pb-24 sm:pt-28 sm:pb-32">
      <div class="max-w-4xl mx-auto text-center">
        <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full border border-s-3 bg-s-1/60 text-sm text-s-5 mb-8">
          <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>
          Zero egress costs — powered by Cloudflare R2
        </div>
        <h1 class="font-display font-bold text-5xl sm:text-7xl tracking-tight leading-[1.05] mb-6">
          Drop. Share.<br>
          <span class="text-brand-400">Done.</span>
        </h1>
        <p class="text-lg sm:text-xl text-s-5 max-w-2xl mx-auto mb-10 leading-relaxed">
          Free static hosting in seconds. No login, no signup, no limits on file count.
          Upload your front-end project and get a shareable link instantly.
        </p>
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
          <a href="#/upload" class="inline-flex items-center gap-2.5 px-8 py-3.5 rounded-xl bg-brand-500 hover:bg-brand-600 text-s-0 font-display font-semibold text-base transition-all hover:shadow-lg hover:shadow-brand-500/20 active:scale-[.97]">
            <i data-lucide="upload" class="w-4 h-4"></i>
            Upload Now
          </a>
          <a href="#/browse" class="inline-flex items-center gap-2.5 px-8 py-3.5 rounded-xl border border-s-3 hover:border-s-4 hover:bg-s-1 text-sm font-medium transition-all">
            <i data-lucide="compass" class="w-4 h-4"></i>
            Browse Projects
          </a>
        </div>
      </div>
    </section>

    <!-- Stats -->
    <section class="px-6 -mt-8 mb-20">
      <div class="max-w-3xl mx-auto grid grid-cols-3 gap-4">
        ${[
          ['0 B','Egress Cost','Zero bandwidth fees, forever'],
          ['Unlimited','File Count','No inode limits on R2'],
          ['Global','CDN Edge','300+ locations worldwide']
        ].map(([val,label,sub]) => `
          <div class="text-center p-5 rounded-2xl bg-s-1/50 border border-s-3/60">
            <div class="font-display font-bold text-xl sm:text-2xl text-brand-400 mb-1">${val}</div>
            <div class="text-sm font-medium text-white/90">${label}</div>
            <div class="text-xs text-s-5 mt-0.5">${sub}</div>
          </div>
        `).join('')}
      </div>
    </section>

    <!-- Features -->
    <section class="px-6 mb-24">
      <div class="max-w-6xl mx-auto">
        <h2 class="font-display font-bold text-3xl sm:text-4xl text-center mb-4">Why PageDrop?</h2>
        <p class="text-s-5 text-center mb-14 max-w-xl mx-auto">Everything you need to share front-end projects, nothing you don't.</p>
        <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5">
          ${[
            ['shield-off','No Login Required','Upload and share using a unique 12-character ID. No accounts, no passwords, no friction.'],
            ['zap','Instant CDN Delivery','Files served from 300+ edge locations. Sub-50ms latency anywhere on Earth.'],
            ['layers','Full Project Upload','Upload HTML, CSS, JS, images, fonts — entire front-end projects as one unit.'],
            ['search','Community Discovery','All public projects are searchable. Find inspiration, learn from real code.'],
            ['lock','VIP Vault','Premium tier with private buckets, WORM storage, and end-to-end encryption.'],
            ['trending-up','Data Insights','Aggregated front-end trend data available for industry analysis.']
          ].map(([icon,title,desc]) => `
            <div class="group p-6 rounded-2xl bg-s-1/40 border border-s-3/50 hover:border-brand-500/30 hover:bg-s-1/70 transition-all duration-300">
              <div class="w-10 h-10 rounded-xl bg-brand-500/10 flex items-center justify-center mb-4 group-hover:bg-brand-500/20 transition-colors">
                <i data-lucide="${icon}" class="w-5 h-5 text-brand-400"></i>
              </div>
              <h3 class="font-display font-semibold text-base mb-2">${title}</h3>

            </div>
          `).join('')}
        </div>
      </div>
    </section>

    <!-- How it works -->
    <section class="px-6 mb-24">
      <div class="max-w-4xl mx-auto">
        <h2 class="font-display font-bold text-3xl sm:text-4xl text-center mb-14">Three Steps. That's It.</h2>
        <div class="grid sm:grid-cols-3 gap-8">
          ${[
            ['1','Drop Files','Drag and drop your HTML, CSS, and JS files onto the upload zone.'],
            ['2','Get Your Link','Receive a unique 12-character ID and an instant shareable URL.'],
            ['3','Share Anywhere','Send the link to anyone. No login needed to view.']
          ].map(([num,title,desc]) => `
            <div class="text-center">
              <div class="w-12 h-12 rounded-2xl bg-brand-500 flex items-center justify-center mx-auto mb-5 font-display font-bold text-lg text-s-0">${num}</div>
              <h3 class="font-display font-semibold text-base mb-2">${title}</h3>

    </section>

    <!-- CTA -->
    <section class="px-6 mb-16">
      <div class="max-w-3xl mx-auto text-center p-12 rounded-3xl border border-s-3/60 bg-gradient-to-b from-s-1/60 to-transparent">
        <h2 class="font-display font-bold text-3xl mb-4">Ready to Drop?</h2>
        <p class="text-s-5 mb-8">Join a growing community of developers sharing front-end work, zero friction.</p>
        <a href="#/upload" class="inline-flex items-center gap-2.5 px-8 py-3.5 rounded-xl bg-brand-500 hover:bg-brand-600 text-s-0 font-display font-semibold transition-all hover:shadow-lg hover:shadow-brand-500/20 active:scale-[.97]">
          <i data-lucide="upload" class="w-4 h-4"></i>
          Start Uploading
        </a>
      </div>

  </div>`;
}

// ====================================================================
// VIEW: UPLOAD
// ====================================================================
function viewUpload() {
  const filesHtml = state.pendingFiles.map((f, i) => `
    <div class="flex items-center gap-3 p-3 rounded-xl bg-s-2/50 border border-s-3/50 group">
      <div class="w-8 h-8 rounded-lg bg-s-3/50 flex items-center justify-center flex-shrink-0">
        <i data-lucide="${getFileIcon(getFileExt(f.name))}" class="w-4 h-4 text-s-5"></i>
      </div>
      <div class="flex-1 min-w-0">
        <div class="text-sm font-medium truncate">${escapeHtml(f.name)}</div>
        <div class="text-xs text-s-5">${formatBytes(f.size)} · ${getFileExt(f.name).toUpperCase().slice(1)}</div>
      </div>
      <button onclick="removeFile(${i})" class="p-1.5 rounded-lg hover:bg-red-500/10 text-s-5 hover:text-red-400 transition-colors opacity-0 group-hover:opacity-100" aria-label="Remove file">
        <i data-lucide="x" class="w-4 h-4"></i>
      </button>
    </div>
  `).join('');

  const tagsHtml = state.tags.map((t, i) => `
    <span class="tag-chip">${escapeHtml(t)}<button onclick="removeTag(${i})" aria-label="Remove tag">&times;</button></span>
  `).join('');

  const resultHtml = state.uploadResult ? `
    <div class="mt-6 p-6 rounded-2xl border border-green-500/30 bg-green-500/5">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-10 h-10 rounded-xl bg-green-500/15 flex items-center justify-center">
          <i data-lucide="check-circle-2" class="w-5 h-5 text-green-400"></i>
        </div>
        <div>
          <div class="font-display font-semibold text-green-300">Upload Successful</div>
          <div class="text-sm text-s-5">Your project ID: <code class="text-brand-400 font-mono">${state.uploadResult.id}</code></div>
        </div>
      </div>
      <div class="flex items-center gap-2 p-3 rounded-xl bg-s-0/50 border border-s-3">

function viewQueue() {

  const statusConfig = {

    processing: { icon:'loader-2', color:'text-blue-400', bg:'bg-blue-500/10', label:'Processing' },
    done: { icon:'check-circle-2', color:'text-green-400', bg:'bg-green-500/10', label:'Complete' },
    error: { icon:'alert-circle', color:'text-red-400', bg:'bg-red-500/10', label:'Error' },

  return `
  <div class="view-enter px-6 py-20 text-center">

          ? `Your project is live! <a href="#/f/${s.fileId}" class="text-brand-400 hover:text-brand-300">View it here</a>.`

// ====================================================================
// DROP ZONE LOGIC
// ====================================================================
function initDropZone() {
  const zone = $('#drop-zone');
  const input = $('#file-input');
  if (!zone || !input) return;

  zone.addEventListener('click', () => input.click());
  zone.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') input.click(); });

  zone.addEventListener('dragenter', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', e => { e.preventDefault(); zone.classList.remove('drag-over'); });
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    addFiles(e.dataTransfer.files);
  });

  input.addEventListener('change', () => { addFiles(input.files); input.value=''; });
}

function addFiles(fileList) {
  let added = 0, rejected = 0;
  for (const f of fileList) {
    if (isAllowedFile(f.name)) {
      // Avoid duplicates
      if (!state.pendingFiles.some(pf => pf.name === f.name && pf.size === f.size)) {
        state.pendingFiles.push(f);
        added++;
      }
    } else {
      rejected++;
    }
  }
  if (added) toast(`${added} file${added>1?'s':''} added`, 'success');
  if (rejected) toast(`${rejected} file${rejected>1?'s':''} skipped (unsupported type)`, 'error');
  render();
}

function removeFile(idx) {
  state.pendingFiles.splice(idx, 1);
  render();
}

function clearFiles() {
  state.pendingFiles = [];
  render();
}

// ====================================================================
// TAG INPUT LOGIC
// ====================================================================
document.addEventListener('keydown', e => {
  if (e.target.id === 'tag-input' && (e.key === 'Enter' || e.key === ',')) {
    e.preventDefault();
    const val = e.target.value.trim().replace(/,$/,'');
    if (val && !state.tags.includes(val) && state.tags.length < 8) {
      state.tags.push(val);
      e.target.value = '';
      render();
      // Re-focus tag input after render
      setTimeout(() => { const ti = $('#tag-input'); if(ti) ti.focus(); }, 10);
    }
  }
});

function removeTag(idx) {
  state.tags.splice(idx, 1);
  render();
}

// ====================================================================
// UPLOAD LOGIC
// ====================================================================
async function doUpload() {
  if (!state.pendingFiles.length || state.uploading) return;
  state.uploading = true;
  state.uploadResult = null;
  render();

  try {
    const fd = new FormData();
    state.pendingFiles.forEach(f => fd.append('files', f));
    if (state.tags.length) fd.append('tags', JSON.stringify(state.tags));

    const data = await api('/api/upload', { method:'POST', body:fd });
    state.uploadResult = data;
    state.pendingFiles = [];
    state.tags = [];
    toast('Project uploaded successfully!', 'success');
  } catch (err) {
    toast(err.message, 'error');
  } finally {
    state.uploading = false;
    render();
  }
}

function copyLink() {
  const input = $('#result-link');
  if (input) {
    navigator.clipboard.writeText(input.value).then(() => toast('Link copied!', 'success'));
  }
}

function copyProjectLink() {
  const url = location.origin + '/#/f/' + state.viewerData.id;
  navigator.clipboard.writeText(url).then(() => toast('Link copied!', 'success'));
}

// ====================================================================
// BROWSE / SEARCH LOGIC
// ====================================================================
let searchTimeout;
function initBrowse() {
  const input = $('#search-input');
  if (!input) return;

  input.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      state.searchQuery = input.value.trim();
      state.searchResults = [];
      state.browseCursor = null;
      doSearch();
    }, 350);
  });

  // Initial load
  if (!state.searchResults.length && !state.searchQuery) doSearch();
}

async function doSearch() {
  state.searchLoading = true;
  render();
  try {
    const params = new URLSearchParams();
    if (state.searchQuery) params.set('q', state.searchQuery);
    if (state.browseCursor) params.set('cursor', state.browseCursor);
    const data = await api('/api/browse?' + params);
    state.searchResults = data.results || [];
    state.browseCursor = data.cursor || null;
  } catch (err) {
    toast(err.message, 'error');
    state.searchResults = [];
  } finally {
    state.searchLoading = false;
    render();
    // Re-focus search input
    setTimeout(() => { const si = $('#search-input'); if(si) { si.focus(); si.selectionStart = si.selectionEnd = si.value.length; } }, 10);
  }
}

async function loadMore() {
  state.searchLoading = true;
  render();
  try {
    const params = new URLSearchParams();
    if (state.searchQuery) params.set('q', state.searchQuery);
    if (state.browseCursor) params.set('cursor', state.browseCursor);
    const data = await api('/api/browse?' + params);
    state.searchResults.push(...(data.results || []));
    state.browseCursor = data.cursor || null;
  } catch (err) {
    toast(err.message, 'error');
  } finally {
    state.searchLoading = false;
    render();
  }
}

// ====================================================================
// FILE VIEWER LOGIC
// ====================================================================
async function initViewer() {
  if (!state.params.id) return;
  state.viewerLoading = true;
  state.viewerData = null;
  render();

  try {
    const data = await api('/api/metadata/' + state.params.id);
    state.viewerData = data;
  } catch (err) {
    state.viewerData = null;
  } finally {
    state.viewerLoading = false;
    render();
  }
}

// ====================================================================
// QUEUE POLLING
// ====================================================================
let queueInterval;
function initQueuePoll() {
  pollQueue();
  queueInterval = setInterval(pollQueue, 3000);
}

function pollQueue() {
  if (!state.params.ticketId) return;
  api('/api/queue/' + state.params.ticketId)
    .then(data => {
      state.queueStatus = data;
      render();
      if (data.status === 'done' || data.status === 'error') clearInterval(queueInterval);
    })
    .catch(() => {
      state.queueStatus = { status:'queued', position:'?' };
      render();
    });
}

document.addEventListener('keydown', e => {
  // Ctrl+U → upload
  if ((e.ctrlKey || e.metaKey) && e.key === 'u') {
    e.preventDefault();
    location.hash = '#/upload';
  }
  // / → focus search (only on browse)
  if (e.key === '/' && state.route === 'browse' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    const si = $('#search-input');
    if (si) si.focus();
  }
});
